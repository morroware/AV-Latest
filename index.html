<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Castle AV Controls</title>
    <!-- Google Fonts with fallback for LiveCode browser widget -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" onerror="this.remove()">
    <!-- Modular CSS: all styles in landing.css -->
    <link rel="stylesheet" href="landing.css">
</head>
<body>
    <div class="centered-content">
        <!-- Password Gate -->
        <div id="passwordDialog">
            <div id="passwordForm">
                <img src="logo.png" alt="Castle AV Controls Logo" class="logo">
                <h1>Castle AV Controls</h1>
                <h5>Enter password to continue</h5>
                <div class="password-container">
                    <input type="password" id="passwordInput" placeholder="Enter password" aria-label="Password" autocomplete="current-password">
                    <button type="button" id="togglePassword" class="toggle-password" aria-label="Show password" title="Show/hide password">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
                <button id="submitPassword">Sign In</button>
                <p id="errorMessage" role="alert" aria-live="polite"></p>
                <p id="attemptCounter" class="attempt-counter"></p>
            </div>
        </div>

        <!-- Main Content (shown after auth) -->
        <div class="container" style="display: none;">
            <img src="logo.png" alt="Castle AV Controls Logo" class="logo">
            <h1>Castle AV Controls</h1>
            <div class="button-grid" id="zone-buttons">
                <span class="loading">Loading zones...</span>
            </div>
            <div class="admin-link">
                <a href="zonemanager.php" title="Add, edit, or manage zones" class="admin-button">
                    <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
                    </svg>
                    Zone Manager
                </a>
                <a href="devices/" title="View all devices and IP addresses" class="admin-button">
                    <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M2 5a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2V5zm14 1a1 1 0 11-2 0 1 1 0 012 0zM2 13a2 2 0 012-2h12a2 2 0 012 2v2a2 2 0 01-2 2H4a2 2 0 01-2-2v-2zm14 1a1 1 0 11-2 0 1 1 0 012 0z" clip-rule="evenodd"/>
                    </svg>
                    Devices
                </a>
            </div>
            <p class="help-text">Select a zone to control AV equipment in that area.</p>
        </div>
    </div>

    <!-- Modular JS: LiveCode compat, auth logic, zone loader -->
    <script src="livecode-compat.js"></script>
    <script src="script.js"></script>
    <script src="landing.js"></script>
</body>
</html>
